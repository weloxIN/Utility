name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker compose build
      - name: CI_encrypt
        run: echo "Token is hidden, length is ${#CI_CD_BUILD}"
        env:
          CI_CD_BUILD: ${{ secrets.CI_CD_BUILD }}
      - name: Scan image with Trivy
        run: |
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | head -1) -o image.tar
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --input image.tar --severity HIGH,CRITICAL --exit-code 1
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Push to Docker Hub
        run: |
          docker images
          docker tag $(docker images --format '{{.Repository}}:{{.Tag}}' | head -1) ${{ secrets.DOCKER_USERNAME }}/soft-osint:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/soft-osint:latest
